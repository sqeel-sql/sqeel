name: Sync hjkl sibling checkout
description: |
  Clone the kryptic-sh/hjkl repo at the version pinned in this
  workspace into a sibling directory next to $GITHUB_WORKSPACE so
  the in-tree [patch.crates-io] block (path = "../hjkl/...") resolves
  during cargo invocations on CI runners.

runs:
  using: composite
  steps:
    - name: Resolve pinned hjkl version + clone alongside
      shell: bash
      run: |
        set -euo pipefail
        # Extract the first =0.0.X hjkl version pin from any Cargo.toml
        # in the workspace. We use `find` instead of shell globs so an
        # empty `*/Cargo.toml` expansion doesn't trip `set -e`. We
        # standardise on lockstep pinning across hjkl-buffer /
        # hjkl-engine / hjkl-editor / hjkl-ratatui, so the first match
        # is authoritative.
        PIN=$(find . -maxdepth 4 -name Cargo.toml -not -path './target/*' \
          -exec grep -h -m1 -oE 'hjkl-[a-z]+ ?= ?(\{[^}]*version ?= ?)?"=[0-9]+\.[0-9]+\.[0-9]+"' {} \; \
          | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
        if [ -z "${PIN:-}" ]; then
          echo "could not extract hjkl pin from Cargo.toml" >&2
          exit 1
        fi
        DEST="$(dirname "$GITHUB_WORKSPACE")/hjkl"
        echo "Cloning hjkl v$PIN into $DEST"
        git clone --depth 1 --branch "v$PIN" \
          https://github.com/kryptic-sh/hjkl.git "$DEST"
