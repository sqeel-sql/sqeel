name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            archive: tar.gz

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }} --bin sqeel --bin sqeel-gui

      - name: Package (Linux / macOS)
        if: matrix.archive == 'tar.gz'
        run: |
          TAG=${GITHUB_REF_NAME}
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sqeel${{ matrix.suffix }} dist/
          cp target/${{ matrix.target }}/release/sqeel-gui${{ matrix.suffix }} dist/
          tar -czf sqeel-${TAG}-${{ matrix.target }}.tar.gz -C dist .

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF_NAME
          New-Item -ItemType Directory -Force dist
          Copy-Item "target/${{ matrix.target }}/release/sqeel${{ matrix.suffix }}" dist/
          Copy-Item "target/${{ matrix.target }}/release/sqeel-gui${{ matrix.suffix }}" dist/
          Compress-Archive -Path dist/* -DestinationPath "sqeel-${TAG}-${{ matrix.target }}.zip"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: sqeel-*.${{ matrix.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
